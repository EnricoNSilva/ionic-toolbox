<ion-content [fullscreen]="true">
  <div class="header-section">
    <h1 class="welcome-title">
      Crie uma <span class="quebra-linha">conta.</span>
    </h1>

    <div class="top-bar">
      <ion-button
        class="btn-back"
        fill="clear"
        routerLink="/login"
        (click)="removerFocoAtual()"
      >
        <ion-icon name="arrow-back-outline" class="arrow-back"></ion-icon>
      </ion-button>

      <ion-icon name="logo-ionitron" class="main-logo"></ion-icon>
    </div>
  </div>

  <div class="form-container">
    <ion-input
      type="email"
      name="email"
      id="email"
      label="E-mail"
      [(ngModel)]="email"
      label-placement="floating"
      fill="outline"
      class="custom-input"
    ></ion-input>

    <ion-input
      type="password"
      name="senha"
      id="senha"
      label="Senha"
      [(ngModel)]="senha"
      label-placement="floating"
      fill="outline"
      class="custom-input"
    ></ion-input>

    <ion-input
      type="password"
      name="confirmarSenha"
      id="confirmarSenha"
      label="Confirmar senha"
      [(ngModel)]="confirmarSenha"
      label-placement="floating"
      fill="outline"
      class="custom-input"
    ></ion-input>

    <ion-button expand="block" class="register-button" (click)="cadastrar()"
      >Cadastrar</ion-button
    >
    <div class="signup-link">
      <p>
        Já tem uma conta?
        <a routerLink="/login" (click)="removerFocoAtual()">Faça login</a>
      </p>
    </div>
  </div>
</ion-content>
