<ion-content [fullscreen]="true">
  <div class="header-section">
    <p class="welcome-subtitle">Insira seus dados para acessar o app.</p>
    <h1 class="welcome-title">Bem-vindo de volta!</h1>
    <ion-icon name="logo-ionitron" class="main-logo"></ion-icon>
  </div>

  <div class="form-container">
    <ion-input type="email" label="E-mail" label-placement="floating" fill="outline" class="custom-input"></ion-input>
    
    <ion-input type="password" label="Senha" label-placement="floating" fill="outline" class="custom-input"></ion-input>
    
    <div class="forgot-password">
      <a href="#">Esqueci minha senha</a>
    </div>

    <ion-button expand="block" class="login-button">Entrar</ion-button>

    <div class="signup-link">
      <p>Ainda não tem uma conta? <a routerLink="/cadastro">Crie aqui</a></p>
    </div>
  </div>
</ion-content>
